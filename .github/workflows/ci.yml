name: CI

on:
  push:
    branches: [main, feature/*]
    paths:
      - 'packages/runtime-adapters/src/treesitter/**'
      - 'packages/runtime-adapters/package.json'
      - 'tests/fixtures/treesitter/**'
      - 'tests/unit/treesitter-*.test.mjs'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Shell Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check shell script syntax
        run: |
          find scripts -type f -name "*.sh" | sort | while read -r f; do
            echo "Checking $f..."
            bash -n "$f" || { echo "SYNTAX ERROR in $f"; exit 1; }
          done
          echo "All shell scripts passed syntax check"

  version-consistency:
    name: Version Consistency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Assert all 6 version sources agree
        run: bash scripts/check-version-consistency.sh

  dapei-commands:
    name: Dapei CLI Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run smoke test
        run: bash scripts/smoke-test.sh

  test-layers:
    name: 4-Layer Test Suite (L1+L2 / L3 / scenarios / L4 AI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: L1+L2 static contracts + router coverage
        run: npm run test:unit -- tests/unit/skill-contracts.test.mjs tests/unit/skill-router-coverage.test.mjs

      - name: L3 engine negative + state pollution
        run: npm run test:integration -- tests/integration/capability-negative.test.mjs tests/integration/capability-state-pollution.test.mjs

      - name: L3-narrative end-to-end scenarios
        run: npm run test:scenarios

      - name: L4 AI behavior compliance (mock harness)
        run: npm run test:ai-behavior

  treesitter-platform-matrix:
    name: Tree-sitter native binding — ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64 (current default)
          - os: macos-latest
            label: darwin-arm64 (Apple Silicon)
          - os: ubuntu-24.04-arm
            label: linux-arm64 (AWS Graviton)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # tree-sitter native bindings may need compile-from-source fallback on
      # some platforms; onlyBuiltDependencies in pnpm-workspace.yaml covers
      # the known packages.
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify tree-sitter grammars load on this platform
        run: |
          node --experimental-strip-types --input-type=module -e "
            import { TreeSitterCodeMapAdapter } from './packages/runtime-adapters/src/treesitter/index.ts';
            const adapter = new TreeSitterCodeMapAdapter();
            const doctor = adapter.fullDoctor();
            console.log('platform:', process.platform, process.arch);
            console.log('languages:', doctor.languages);
            if (doctor.languages.length !== 4) {
              console.error('Expected 4 languages, got', doctor.languages.length);
              process.exit(1);
            }
          "

      - name: Run tree-sitter smoke + decorators + types tests
        run: |
          node --experimental-strip-types --test \
            tests/unit/treesitter-smoke.test.mjs \
            tests/unit/treesitter-decorators.test.mjs \
            tests/unit/treesitter-types.test.mjs

      - name: Cold-start budget check (< 500 ms)
        run: |
          node --experimental-strip-types --input-type=module -e "
            import { performance } from 'node:perf_hooks';
            import { TreeSitterCodeMapAdapter } from './packages/runtime-adapters/src/treesitter/index.ts';
            const t0 = performance.now();
            new TreeSitterCodeMapAdapter();
            const elapsed = performance.now() - t0;
            console.log('cold start:', elapsed.toFixed(0), 'ms');
            if (elapsed > 500) {
              console.error('Cold start exceeded 500 ms budget');
              process.exit(1);
            }
          "

  guardrail:
    name: Dapei Guardrail Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run guardrail on existing features
        run: |
          if [ -d "features/payment-refactor" ]; then
            ./scripts/dapei-guardrail payment-refactor
          else
            echo "No features to check"
          fi

  schema-validate:
    name: YAML Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate schemas
        run: |
          echo "=== Validating schemas ==="
          for schema in .dapei/schemas/*.yaml .dapei/*.schema.yaml; do
            echo "Checking $schema..."
            node -e "
              const fs = require('fs');
              const yaml = require('js-yaml');
              const Ajv = require('ajv/dist/2020');
              const addFormats = require('ajv-formats');

              const schemaContent = fs.readFileSync('$schema', 'utf8');
              const schemaObj = yaml.load(schemaContent);

              const ajv = new Ajv({ allErrors: true });
              addFormats(ajv);

              // Test that schema itself is valid JSON Schema
              try {
                ajv.compile(schemaObj);
                console.log('  OK - valid JSON Schema');
              } catch (e) {
                console.error('  ERROR - invalid JSON Schema:', e.message);
                process.exit(1);
              }
            " || exit 1
          done

      - name: Validate commands.yaml
        run: |
          echo "=== Validating commands.yaml ==="
          node -e "
            const fs = require('fs');
            const yaml = require('js-yaml');

            const content = fs.readFileSync('.dapei/commands.yaml', 'utf8');
            const doc = yaml.load(content);

            if (!doc.version) throw new Error('missing version');
            if (!Array.isArray(doc.commands)) throw new Error('commands must be array');

            for (const cmd of doc.commands) {
              if (!cmd.name) throw new Error('command missing name');
              if (!cmd.cli) throw new Error('command ' + cmd.name + ' missing cli');
              if (!cmd.purpose) throw new Error('command ' + cmd.name + ' missing purpose');
              if (!Array.isArray(cmd.workflow)) throw new Error('command ' + cmd.name + ' workflow must be array');
            }
            console.log('  OK - commands.yaml is valid');
          "

      - name: Validate rules YAML syntax
        run: |
          echo "=== Validating rules ==="
          for rule in .dapei/rules/*.yaml; do
            echo "Checking $rule..."
            node -e "
              const fs = require('fs');
              const yaml = require('js-yaml');
              const content = fs.readFileSync('$rule', 'utf8');
              const doc = yaml.load(content);
              if (!doc) throw new Error('empty or invalid YAML');
              console.log('  OK - valid YAML');
            " || exit 1
          done
