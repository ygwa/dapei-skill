    </g>
  </g>

  <g transform="translate(86 2250)">
    <text x="0" y="0" class="section">五、CDR 知识生产线、Feature 维度边界与证据红线</text><rect class="panel" x="0" y="26" width="1628" height="230"/>
    <g transform="translate(36 70)">
      <rect class="cdr" x="0" y="0" width="220" height="82"/><text x="20" y="30" class="label">L0 Profile</text><text x="20" y="58" class="monoSmall">cdr.profile</text><path class="hot" d="M230 41 L286 41"/>
      <rect class="cdr" x="296" y="0" width="220" height="82"/><text x="316" y="30" class="label">L2 Entries</text><text x="316" y="58" class="monoSmall">candidate → propose → confirm</text><path class="hot" d="M526 41 L582 41"/>
      <rect class="cdr" x="592" y="0" width="220" height="82"/><text x="612" y="30" class="label">L3 Behavior</text><text x="612" y="58" class="monoSmall">cdr.behavior.upsert</text><path class="hot" d="M822 41 L878 41"/>
      <rect class="cdr" x="888" y="0" width="220" height="82"/><text x="908" y="30" class="label">L3 State / Rules</text><text x="908" y="58" class="monoSmall">state.derive · business.compose</text><path class="hot" d="M1118 41 L1174 41"/>
      <rect class="cdr" x="1184" y="0" width="170" height="82"/><text x="1204" y="30" class="label">L2 Domain</text><text x="1204" y="58" class="monoSmall">derived_from[]</text><path class="hot" d="M1364 41 L1420 41"/>
      <rect class="cdr" x="1430" y="0" width="150" height="82"/><text x="1450" y="30" class="label">L1 Map</text><text x="1450" y="58" class="monoSmall">capability map</text>
    </g>
    <g transform="translate(36 172)"><rect class="warn" x="0" y="0" width="506" height="56"/><text x="18" y="34" class="small"><tspan class="pink">Evidence contract：</tspan> fact → sources[]；inference → derived_from[]；unknown → reason。</text><rect class="ok" x="566" y="0" width="464" height="56"/><text x="584" y="34" class="small"><tspan class="accent">Dimension：</tspan> active feature 写 features/&lt;f&gt;；workspace 只由 close 或 cdr.* 写。</text><rect class="soft" x="1070" y="0" width="510" height="56"/><text x="1088" y="34" class="small"><tspan class="gold">Portal：</tspan> docs/as-is/* + .dapei/cognitive/index.yaml → .dapei/docs-portal/</text></g>
  </g>
  <g transform="translate(86 2504)"><text x="0" y="0" class="tiny">Source: repository docs, SKILL.md router, packages/core capability registry, packages/router routes, skills/cdr and commands. Generated for dapei.skill architecture overview.</text></g>
