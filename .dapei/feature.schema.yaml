$schema: "https://json-schema.org/draft/2020-12/schema"
title: dapei feature manifest v2
type: object
required:
  - version
  - feature
properties:
  version:
    type: string
    enum: ["0.2"]
  feature:
    type: object
    required:
      - name
      - objective
      - owner
      - repos
      - acceptance
    properties:
      name:
        type: string
        pattern: "^[a-z0-9-]+$"
      objective:
        type: string
        minLength: 10
      owner:
        type: string
      isolation:
        type: string
        enum: [symlink, worktree]
      repos:
        type: array
        minItems: 1
        items:
          type: object
          required:
            - name
            - branch
            - base-ref
          properties:
            name:
              type: string
            branch:
              type: string
            base-ref:
              type: string
              description: "master commit hash at feature creation"
            base-time:
              type: string
              format: date-time
            path:
              type: string
      scope:
        type: object
        properties:
          in:
            type: array
            items: { type: string }
          out:
            type: array
            items: { type: string }
      acceptance:
        type: array
        minItems: 1
        items:
          type: string
      risk_level:
        type: string
        enum: [low, medium, high]
      dependencies:
        type: array
        items: { type: string }
      last-review-at:
        oneOf:
          - type: string
            format: date-time
          - type: "null"
additionalProperties: false
