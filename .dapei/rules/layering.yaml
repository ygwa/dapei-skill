version: 0.1
rule_set: layering
mode: report
rules:
  - id: LAYER-001
    title: no direct edits in codebase by agent
    severity: high
    check:
      type: path-deny
      patterns:
        - "codebase/**"
    message: agent must work in features/* only

  - id: LAYER-002
    title: feature must declare repo boundaries
    severity: medium
    check:
      type: file-required
      files:
        - "features/<feature>/feature.yaml"
        - "features/<feature>/context/constraints.md"
