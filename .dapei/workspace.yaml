version: 0.2
workspace:
  name: dapei-skill
  root: .
  default_branch: main
  locale: zh-CN
  codebases_file: .dapei/codebases.yaml

repos:
  codebase_root: codebase
  feature_repo_mode: symlink
  managed_repos: []

context_loading:
  strategy: layered
  bundle_file: context/runtime-context.md
  layers:
    - name: global
      priority: 10
      merge_policy: deny
      sources:
        - docs/standards
        - runtime/ai-rules
    - name: workspace
      priority: 20
      merge_policy: append
      sources:
        - docs/as-is
        - docs/architecture
        - docs/workflows
    - name: domain
      priority: 30
      merge_policy: append
      sources:
        - docs/business
        - docs/domain
        - docs/glossary
    - name: repo
      priority: 40
      merge_policy: append
      sources:
        - docs/as-is/repo-inventory.md
    - name: feature
      priority: 50
      merge_policy: override
      sources:
        - features/<feature>/context
        - features/<feature>/docs
    - name: runtime
      priority: 60
      merge_policy: override
      sources:
        - features/<feature>/tasks

agent_runtime:
  default_profile: implementer
  profiles:
    - name: analyst
      responsibilities:
        - reverse-engineer codebase current state
        - distinguish evidence from inference
    - name: architect
      responsibilities:
        - produce business and technical design
        - validate architecture boundaries
    - name: implementer
      responsibilities:
        - implement scoped tasks
        - update memory and reports
    - name: reviewer
      responsibilities:
        - validate architecture and risks
        - produce findings report

quality_gates:
  guardrail_mode: report
  required_reports:
    - feature-progress
    - daily-report
    - architecture-review
    - validation-report
