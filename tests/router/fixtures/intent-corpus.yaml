  - id: cdr.crossrepo.doc.generate.english
    intent: "render cross-repo portal"
    expect:
      capability: cdr.crossrepo.doc.generate
      min_confidence: 0.85
  - id: cdr.crossrepo.doc.generate.chinese
    intent: "生成跨仓库门户"
    expect:
      capability: cdr.crossrepo.doc.generate
      min_confidence: 0.85

  # --- cdr.doc.generate (route #16) ---
  - id: cdr.doc.generate.english
    intent: "generate documentation portal"
    expect:
      capability: cdr.doc.generate
      min_confidence: 0.85
  - id: cdr.doc.generate.chinese
    intent: "生成文档门户"
    expect:
