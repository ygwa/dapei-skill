  # --- feature.report (route #26) ---
  - id: feature.report.english
    intent: "generate report for feature auth"
    expect:
      capability: feature.report
      min_confidence: 0.75

  # --- feature.review (route #27) ---
  - id: feature.review.english
    intent: "review feature auth"
    expect:
      capability: feature.review
      min_confidence: 0.75

  # --- feature.close (route #28 normal order) ---
  - id: feature.close.normal
    intent: "close feature payment-refactor"
    expect:
      capability: feature.close
      min_confidence: 0.85

  # --- feature.close (route #29 reversed order) ---
  - id: feature.close.reversed
    intent: "feature close payment-refactor"
    expect:
      capability: feature.close
      min_confidence: 0.85

  # --- feature.status (route #30) ---
  - id: feature.status.fallback
    intent: "status"
    expect:
      capability: feature.status
      min_confidence: 0.6

# Conflicting intents — must resolve to a single capability. The test
# runner asserts the winner matches what `expect.winner` says; if it does
# not, a precedence bug has appeared. Listed conflicts mirror the
# ordering-sensitive comments in the existing router.
conflicts:
  - id: conflict.render.cross_repo_beats_plain
    intent: "render cross-repo portal"
    expect:
      winner: cdr.crossrepo.doc.generate
      loser: cdr.doc.generate
  - id: conflict.render.synth_beats_init
    intent: "synth capability map for E-Commerce Mall"
    expect:
      winner: cdr.capability.map.synth
      loser: cdr.capability.map.init
  - id: conflict.bootstrap_beats_cdr_profile
    intent: "bootstrap sample-app"
    expect:
      winner: cdr.bootstrap
      loser: cdr.profile
