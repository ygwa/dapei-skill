      min_confidence: 0.85

  # --- cdr.index.list (route #17) ---
  - id: cdr.index.list.english
    intent: "list assets"
    expect:
      capability: cdr.index.list
      min_confidence: 0.8
  - id: cdr.index.list.chinese
