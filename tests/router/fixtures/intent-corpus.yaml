# Router intent corpus — golden fixtures for regression testing.
#
# Each entry is a single intent (the literal text a user would type after
# `@dapei`) plus the expected route result. The router is expected to match
# the listed `capability` with `confidence >= min_confidence`. Inputs are
# checked as a deep-equal subset (extra keys are allowed so the corpus
# stays stable when extractors gain new fields).
#
# This file is the source of truth for "what the router is allowed to do
# today". Any change to a route must be reflected here first; the test
# runner then verifies the live router still honors it.
#
# Coverage rationale: each existing route has at least one entry covering
# its primary English pattern and one Chinese pattern where applicable.
# Conflicts (two routes both match) are flagged so the test runner can
# assert on the winner and surface silent precedence bugs.

cases:
  # --- workspace.init (route #1) ---
  - id: workspace.init.english.short
    intent: "initialize workspace"
    expect:
      capability: workspace.init
      min_confidence: 0.9
  - id: workspace.init.english.alias
    intent: "init workspace"
    expect:
      capability: workspace.init
      min_confidence: 0.9

  # --- repos.add (route #2) ---
  - id: repos.add.english
    intent: "repos add my-repo git@example.com/repo.git"
    expect:
      capability: repos.add
      min_confidence: 0.85
      input_contains:
        url: "git@example.com/repo.git"
  - id: repos.add.with_name_flag
    intent: "repos add foo"
    expect:
      capability: repos.add
      min_confidence: 0.85
      input_contains:
        name: "foo"

  # --- cognitive.discover (route #3) ---
  - id: cognitive.discover.english
    intent: "analyze behaviors for sample-app"
    expect:
      capability: cognitive.discover
      min_confidence: 0.85
  - id: cognitive.discover.singular
    intent: "discover behavior for sample-app"
    expect:
      capability: cognitive.discover
      min_confidence: 0.85

  # --- cognitive.artifact.list (route #4) ---
  - id: cognitive.artifact.list.english
    intent: "list behaviors for sample-app"
    expect:
      capability: cognitive.artifact.list
      min_confidence: 0.85

  # --- cdr.profile (route #5) ---
  - id: cdr.profile.english
    intent: "profile repo sample-app"
    expect:
      capability: cdr.profile
      min_confidence: 0.85
      input_contains:
        repo: "sample-app"
  - id: cdr.profile.chinese
    intent: "分析 repo sample-app"
    expect:
      capability: cdr.profile
      min_confidence: 0.85
      input_contains:
        repo: "sample-app"

  # --- cdr.entries.prepare (route #6, thin orchestrator) ---
  - id: cdr.entries.prepare.english
    intent: "discover entries for sample-app"
    expect:
      capability: cdr.entries.prepare
      min_confidence: 0.9
  - id: cdr.entries.prepare.chinese
    intent: "扫描入口 for sample-app"
    expect:
      capability: cdr.entries.prepare
      min_confidence: 0.85

  # --- cdr.entries.confirm (route #7) ---
  - id: cdr.entries.confirm.english
    intent: "confirm entry order-create"
    expect:
      capability: cdr.entries.confirm
      min_confidence: 0.85
  - id: cdr.entries.confirm.chinese
    intent: "确认入口 order-create"
    expect:
      capability: cdr.entries.confirm
      min_confidence: 0.85

  # --- cognitive.state.suggest (route #8) ---
  - id: cognitive.state.suggest.english
    intent: "discover states for Order"
    expect:
      capability: cognitive.state.suggest
      min_confidence: 0.9
  - id: cognitive.state.suggest.chinese
    intent: "推导状态 for Order"
    expect:
      capability: cognitive.state.suggest
      min_confidence: 0.85

  # --- cdr.domain.compose (route #9) ---
  - id: cdr.domain.compose.english
