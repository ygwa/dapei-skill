    expect:
      capability: cdr.domain.compose
      min_confidence: 0.85
  - id: cdr.domain.compose.chinese
    intent: "组合领域 Transaction"
    expect:
      capability: cdr.domain.compose
      min_confidence: 0.85

  # --- cdr.capability.map.init (route #10) ---
  - id: cdr.capability.map.init.english
    intent: "init capability map for E-Commerce Mall"
    expect:
      capability: cdr.capability.map.init
      min_confidence: 0.85
  - id: cdr.capability.map.init.chinese
    intent: "初始化功能地图"
    expect:
      capability: cdr.capability.map.init
      min_confidence: 0.85

  # --- cdr.bootstrap (route #11, v0.8) ---
  - id: cdr.bootstrap.english
    intent: "bootstrap sample-app"
    expect:
      capability: cdr.bootstrap
      min_confidence: 0.85
      input_contains:
        repo: "sample-app"
  - id: cdr.bootstrap.chinese
